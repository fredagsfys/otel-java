# Keep tests hermetic while still exercising the full OpenTelemetry auto-configuration:
# load the SDK but use no-op exporters so nothing tries to reach a collector. This is
# the analog of the Go test's OTEL_*_EXPORTER=none and catches wiring/version issues.
otel.traces.exporter=none
otel.metrics.exporter=none
otel.logs.exporter=none

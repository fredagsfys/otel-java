spring:
  application:
    # Used as the OpenTelemetry service.name (override with otel.service.name or OTEL_SERVICE_NAME).
    name: greeter-service-java
  lifecycle:
    # Max time to wait for in-flight requests to finish during graceful shutdown.
    timeout-per-shutdown-phase: 20s

server:
  port: 8080
  # Drain in-flight requests on SIGTERM instead of dropping them.
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        # Only expose what's needed; actuator exposes nothing else over HTTP.
        include: health, info
  endpoint:
    health:
      # Expose /actuator/health/liveness and /actuator/health/readiness probes.
      probes:
        enabled: true
      # Don't leak component details to unauthenticated callers.
      show-details: when-authorized

# Everything else — OTLP endpoint, protocol, headers, sampling, resource attributes —
# is read from the standard OTEL_* environment variables (see README). The OTLP exporter
# defaults to http://localhost:4318, which matches the local collector in observability/.
